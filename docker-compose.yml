services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meaplant
      POSTGRES_USER: meaplant
      POSTGRES_PASSWORD: localdev
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meaplant"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://meaplant:localdev@db:5432/meaplant
      CORS_ORIGINS: http://localhost:5173
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
    volumes: [./backend:/app]

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports: ["5173:5173"]
    depends_on: [backend]
    volumes: [./frontend:/app, /app/node_modules]

volumes:
  pgdata:
